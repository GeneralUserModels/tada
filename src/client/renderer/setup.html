<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Tada Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #F4F2EE;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 32px;
      -webkit-app-region: drag;
    }
    .container {
      width: 100%;
      max-width: 440px;
      -webkit-app-region: no-drag;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }
    .status {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      min-height: 18px;
    }
    .progress-track {
      width: 100%;
      height: 5px;
      background: #ddd;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4a90d9;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .progress-bar.indeterminate {
      width: 30%;
      animation: slide 1.5s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { margin-left: 0%; }
      50%  { margin-left: 70%; }
      100% { margin-left: 0%; }
    }
    .log-box {
      background: #1e1e1e;
      color: #cccccc;
      font-family: "SF Mono", "Menlo", "Monaco", monospace;
      font-size: 11px;
      line-height: 1.5;
      border-radius: 8px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-box .log-step {
      color: #6bb5ff;
      font-weight: 600;
    }
    .error-box {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }
    .error-msg {
      font-size: 12px;
      color: #cc3333;
      margin-bottom: 10px;
      max-height: 60px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    button {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 6px 20px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #3a7bc8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Setting up Tada</h1>
    <div class="subtitle" id="subtitle">This can take a few minutes.</div>
    <div class="status" id="status">Preparing...</div>
    <div class="progress-track">
      <div class="progress-bar indeterminate" id="progress"></div>
    </div>
    <div class="log-box" id="log"></div>
    <div class="error-box" id="error">
      <div class="error-msg" id="error-msg"></div>
      <button id="retry-btn">Retry</button>
    </div>
  </div>
  <script>
    const statusEl = document.getElementById("status");
    const progressEl = document.getElementById("progress");
    const logEl = document.getElementById("log");
    const errorEl = document.getElementById("error");
    const errorMsgEl = document.getElementById("error-msg");
    const retryBtn = document.getElementById("retry-btn");

    function appendLog(text, isStep) {
      const span = document.createElement("span");
      if (isStep) span.className = "log-step";
      span.textContent = text + "\n";
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    window.tada.onBootstrapProgress((msg, pct) => {
      statusEl.textContent = msg;
      progressEl.classList.remove("indeterminate");
      progressEl.style.width = pct + "%";
      appendLog(msg, true);
    });

    window.tada.onBootstrapLog((line) => {
      appendLog(line, false);
    });

    window.tada.onBootstrapError((errMsg) => {
      statusEl.textContent = "Setup failed";
      progressEl.classList.remove("indeterminate");
      progressEl.style.width = "0%";
      progressEl.style.background = "#cc3333";
      errorEl.style.display = "block";
      errorMsgEl.textContent = errMsg;
      appendLog("ERROR: " + errMsg, true);
    });

    window.tada.onBootstrapComplete(() => {
      statusEl.textContent = "Setup complete! Launching...";
      progressEl.classList.remove("indeterminate");
      progressEl.style.width = "100%";
      appendLog("Done!", true);
    });

    retryBtn.addEventListener("click", () => {
      errorEl.style.display = "none";
      progressEl.style.background = "#4a90d9";
      progressEl.classList.add("indeterminate");
      progressEl.style.width = "";
      statusEl.textContent = "Retrying...";
      logEl.innerHTML = "";
      window.tada.retryBootstrap();
    });
  </script>
</body>
</html>
