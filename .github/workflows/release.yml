name: Tag Build (Local Release Source of Truth)

on:
  push:
    tags:
      - "v*"

jobs:
  tag-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Build app only (no signing/notarization/publish)
        run: npm run build
