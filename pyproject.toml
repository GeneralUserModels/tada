[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "powernap"
version = "0.1.0"
description = "PowerNap training and retrieval utilities."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "accelerate",
    "datasets",
    "litellm",
    "numpy",
    "pack",
    "pandas",
    "peft",
    "pillow",
    "python-dotenv",
    "rich",
    "screeninfo",
    "tinker",
    "tinker-cookbook",
    "torch",
    "transformers",
    "trl",
    "wandb",
]

[tool.uv.sources]
pack = { path = "./pack", editable = true }
tinker-cookbook = { path = "./tinker-cookbook", editable = true }

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
